name: CI

# Validates the *harness* on every push/PR. Deliberately keyless: it runs the
# sanity tests and the rule-based baseline, so it never needs API secrets and
# never spends credits. Publishing real model results is a separate, manual step
# (run the bench locally, then `scripts/build_leaderboard.py` + commit docs/).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core only, no model SDKs)
        run: pip install -e .
      - name: Sanity tests (grader calibration + schema validity)
        run: PYTHONPATH=. python tests/test_harness.py
      - name: Baseline smoke run
        run: python -m molbench.runner --models baseline --categories api_calling
      - name: Leaderboard builder runs
        run: python scripts/build_leaderboard.py
